<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPoint · Invoices</title>
    <style>
        /* ============================================
           GLOBAL RESET & VARIABLES
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0E1A;
            color: #FFFFFF;
            padding: 24px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ============================================
           NAVBAR
        ============================================ */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 32px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #F59E0B, #FCD34D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            color: #94A3B8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #FFFFFF;
        }

        .nav-links a.active {
            color: #F59E0B;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-links a.logout {
            color: #EF4444;
        }

        .nav-links a.logout:hover {
            color: #DC2626;
        }

        /* ============================================
           PAGE HEADER
        ============================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .page-header h1 span {
            color: #94A3B8;
            font-weight: 400;
        }

        .btn-primary {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #0A0E1A;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* ============================================
           INVOICE LIST
        ============================================ */
        .invoice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .invoice-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s;
        }

        .invoice-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(245, 158, 11, 0.2);
        }

        .invoice-card .brand {
            font-size: 18px;
            font-weight: 700;
        }

        .invoice-card .amount {
            font-size: 24px;
            font-weight: 700;
            color: #F59E0B;
            margin: 8px 0;
        }

        .invoice-card .details {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .invoice-card .status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }

        .invoice-card .status.sent {
            background: rgba(16, 185, 129, 0.15);
            color: #10B981;
        }

        .invoice-card .status.draft {
            background: rgba(245, 158, 11, 0.15);
            color: #F59E0B;
        }

        .invoice-card .status.paid {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .invoice-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn-invoice {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-invoice.gold {
            background: rgba(245, 158, 11, 0.15);
            color: #F59E0B;
        }

        .btn-invoice.gold:hover {
            background: rgba(245, 158, 11, 0.25);
        }

        .btn-invoice.green {
            background: rgba(16, 185, 129, 0.15);
            color: #10B981;
        }

        .btn-invoice.green:hover {
            background: rgba(16, 185, 129, 0.25);
        }

        .btn-invoice.blue {
            background: rgba(59, 130, 246, 0.15);
            color: #3B82F6;
        }

        .btn-invoice.blue:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        /* ============================================
           EMPTY STATE
        ============================================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748B;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        /* ============================================
           MODAL (Create Invoice)
        ============================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 6px;
            color: #FFFFFF;
        }

        .modal p {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #CBD5E1;
            margin-bottom: 6px;
        }

        .modal select,
        .modal input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 14px;
            margin-bottom: 18px;
            transition: border 0.2s;
        }

        .modal select:focus,
        .modal input:focus {
            outline: none;
            border-color: #F59E0B;
        }

        .modal select option {
            background: #1A1F2E;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #0A0E1A;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #94A3B8;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ============================================
           RESPONSIVE
        ============================================ */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 16px;
            }

            .invoice-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 16px;
                padding: 24px;
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
    <script src="config.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- ==========================================
        NAVBAR
        ========================================== -->
        <nav class="navbar">
            <a href="index.html" class="logo">PayPoint</a>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="deals.html">Deals</a>
                <a href="expenses.html">Expenses</a>
                <a href="invoices.html" class="active">Invoices</a>
                <a href="creator.html">Creator</a>
                <span class="user-badge" id="userBadge">👤 Creator</span>
                <a href="#" class="logout" id="navLogout">Logout</a>
            </div>
        </nav>

        <!-- ==========================================
        PAGE HEADER
        ========================================== -->
        <div class="page-header">
            <h1>Invoices <span>· Send professional invoices to brands</span></h1>
            <button class="btn-primary" id="openModalBtn">+ Create Invoice</button>
        </div>

        <!-- ==========================================
        INVOICE LIST
        ========================================== -->
        <div class="invoice-grid" id="invoiceGrid">
            <div class="empty-state">
                <div class="icon">📄</div>
                <h3>No invoices yet</h3>
                <p>Create your first invoice from a brand deal.</p>
            </div>
        </div>
    </div>

    <!-- ==========================================
    MODAL (Create Invoice)
    ========================================== -->
    <div class="modal-overlay" id="invoiceModal">
        <div class="modal">
            <h2>📄 Create Invoice</h2>
            <p>Select a deal to convert into a professional invoice.</p>

            <label for="modalDeal">Select Deal</label>
            <select id="modalDeal">
                <option value="">Loading deals...</option>
            </select>

            <label for="modalInvoiceNumber">Invoice Number (Optional)</label>
            <input type="text" id="modalInvoiceNumber" placeholder="e.g. INV-001">

            <label for="modalBrandEmail">Brand Email</label>
            <input type="email" id="modalBrandEmail" placeholder="finance@brand.com">

            <div class="modal-actions">
                <button class="btn-cancel" id="closeModalBtn">Cancel</button>
                <button class="btn-save" id="createInvoiceBtn">Create & Send</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
    JAVASCRIPT
    ========================================== -->
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_URL = window.__API_URL__ || 'https://paypoint-backend-9m63.onrender.com/api';
        let allDeals = [];
        let invoices = [];

        // ============================================
        // DOM REFERENCES
        // ============================================
        const invoiceGrid = document.getElementById('invoiceGrid');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const createInvoiceBtn = document.getElementById('createInvoiceBtn');
        const modal = document.getElementById('invoiceModal');
        const modalDeal = document.getElementById('modalDeal');
        const modalInvoiceNumber = document.getElementById('modalInvoiceNumber');
        const modalBrandEmail = document.getElementById('modalBrandEmail');

        // ============================================
        // CHECK AUTHENTICATION
        // ============================================
        function checkAuth() {
            const user = localStorage.getItem('paypoint_user');
            if (!user) {
                window.location.href = 'login.html';
            } else {
                try {
                    const userData = JSON.parse(user);
                    document.getElementById('userBadge').textContent = `👤 ${userData?.user_metadata?.name || 'Creator'}`;
                } catch (e) {
                    document.getElementById('userBadge').textContent = '👤 Creator';
                }
            }
        }

        // ============================================
        // AUTH HEADER HELPERS
        // ============================================
        function getAuthHeaders() {
            const token = localStorage.getItem('paypoint_session');
            return {
                'Content-Type': 'application/json',
                ...(token ? { Authorization: `Bearer ${token}` } : {})
            };
        }

        // ============================================
        // LOAD DEALS FOR INVOICES
        // ============================================
        async function loadDealsForInvoices() {
            try {
            const res = await fetch(`${API_URL}/deals`, { headers: getAuthHeaders() });
                const result = await res.json();

                if (result.success) {
                    allDeals = result.data || [];
                    renderInvoices(allDeals);
                    populateDealDropdown(allDeals);
                }
            } catch (err) {
                console.error('Error loading deals:', err);
            }
        }

        // ============================================
        // RENDER INVOICES
        // ============================================
        function renderInvoices(deals) {
            if (deals.length === 0) {
                invoiceGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📄</div>
                        <h3>No invoices yet</h3>
                        <p>Create your first invoice from a brand deal.</p>
                    </div>
                `;
                return;
            }

            invoiceGrid.innerHTML = '';
            deals.forEach(deal => {
                const card = document.createElement('div');
                card.className = 'invoice-card';

                // Random status for demo
                const statuses = ['draft', 'sent', 'paid'];
                const status = statuses[Math.floor(Math.random() * statuses.length)];

                card.innerHTML = `
                    <div class="brand">${deal.brand_name}</div>
                    <div class="amount">$${Number(deal.amount).toLocaleString()}</div>
                    <div class="details">📅 Due: ${deal.due_date ? new Date(deal.due_date).toLocaleDateString() : 'Not set'}</div>
                    <div class="details">📋 ${deal.deliverable || 'No deliverable'}</div>
                    <span class="status ${status}">${status.toUpperCase()}</span>
                    <div class="invoice-actions">
                        <button class="btn-invoice gold" onclick="previewInvoice('${deal.id}')">👁️ Preview</button>
                        <button class="btn-invoice blue" onclick="downloadInvoice('${deal.id}')">⬇️ Download PDF</button>
                        <button class="btn-invoice green" onclick="sendInvoice('${deal.id}')">📧 Send</button>
                    </div>
                `;
                invoiceGrid.appendChild(card);
            });
        }

        // ============================================
        // POPULATE DEAL DROPDOWN
        // ============================================
        function populateDealDropdown(deals) {
            modalDeal.innerHTML = '';
            if (deals.length === 0) {
                modalDeal.innerHTML = '<option value="">No deals available</option>';
                return;
            }

            deals.forEach(deal => {
                const option = document.createElement('option');
                option.value = deal.id;
                option.textContent = `${deal.brand_name} - $${Number(deal.amount).toLocaleString()}`;
                modalDeal.appendChild(option);
            });
        }

        // ============================================
        // PREVIEW INVOICE
        // ============================================
        function previewInvoice(id) {
            const deal = allDeals.find(d => d.id === id);
            if (!deal) return;

            alert(`
📄 INVOICE PREVIEW
━━━━━━━━━━━━━━━━━━━━━

Brand: ${deal.brand_name}
Amount: $${Number(deal.amount).toLocaleString()}
Deliverable: ${deal.deliverable || 'Not specified'}
Due Date: ${deal.due_date ? new Date(deal.due_date).toLocaleDateString() : 'Not set'}
Status: ${deal.status || 'pending'}

━━━━━━━━━━━━━━━━━━━━━
PayPoint · Professional Invoicing
            `);
        }

        // ============================================
        // DOWNLOAD INVOICE (PDF)
        // ============================================
        async function downloadInvoice(id) {
            const deal = allDeals.find(d => d.id === id);
            if (!deal) return;

            try {
                alert(`⬇️ Generating PDF for ${deal.brand_name}...`);
                
                const res = await fetch(`${API_URL}/invoices/generate`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ dealId: id })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `invoice-${deal.brand_name}-${Date.now()}.pdf`;
                    a.click();
                    URL.revokeObjectURL(url);
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + (error.error || 'Failed to generate PDF'));
                }
            } catch (err) {
                alert('❌ Could not connect to server');
                console.error(err);
            }
        }

        // ============================================
        // SEND INVOICE (creates invoice record and optionally starts Paystack payment)
        // ============================================
        async function sendInvoice(id) {
            const deal = allDeals.find(d => d.id === id);
            if (!deal) return;

            const brandEmail = prompt(`📧 Enter email to send invoice to ${deal.brand_name}:`, deal.brand_email || 'finance@brand.com');
            if (!brandEmail) return;

            // Create invoice record first
            try {
                const res = await fetch(`${API_URL}/invoices/create`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ dealId: id, invoiceNumber: `INV-${Date.now()}`, brandEmail })
                });

                const result = await res.json();
                if (!result.success) {
                    alert('❌ Error creating invoice: ' + (result.error || 'Failed'));
                    return;
                }
            } catch (err) {
                alert('❌ Could not connect to server');
                console.error(err);
                return;
            }

            // Initialize Paystack payment for this deal
            try {
                const payRes = await fetch(`${API_URL}/payments/initialize`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ dealId: id, email: brandEmail })
                });

                const payResult = await payRes.json();
                if (payResult && payResult.authorization_url) {
                    // redirect to Paystack checkout
                    window.location.href = payResult.authorization_url;
                } else {
                    alert('❌ Payment initialization failed');
                    console.error('Payment init failed', payResult);
                }
            } catch (err) {
                alert('❌ Could not initialize payment');
                console.error(err);
            }
        }

        // ============================================
        // OPEN MODAL
        // ============================================
        openModalBtn.addEventListener('click', () => {
            modalDeal.value = '';
            modalInvoiceNumber.value = '';
            modalBrandEmail.value = '';
            modal.classList.add('active');
        });

        // ============================================
        // CLOSE MODAL
        // ============================================
        function closeModal() {
            modal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // ============================================
        // CREATE INVOICE
        // ============================================
        createInvoiceBtn.addEventListener('click', async () => {
            const dealId = modalDeal.value;
            const invoiceNumber = modalInvoiceNumber.value.trim();
            const brandEmail = modalBrandEmail.value.trim();

            if (!dealId) {
                alert('Please select a deal');
                return;
            }

            if (!brandEmail) {
                alert('Please enter the brand email');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/invoices/create`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        dealId,
                        invoiceNumber: invoiceNumber || `INV-${Date.now()}`,
                        brandEmail
                    })
                });

                const result = await res.json();
                if (result.success) {
                    alert('✅ Invoice created and sent to ' + brandEmail);
                    closeModal();
                    loadDealsForInvoices();
                } else {
                    alert('❌ Error: ' + (result.error || 'Failed to create invoice'));
                }
            } catch (err) {
                alert('❌ Could not connect to server');
                console.error(err);
            }
        });

        // ============================================
        // LOGOUT
        // ============================================
        document.getElementById('navLogout')?.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch(`${API_URL}/auth/logout`, { method: 'POST', headers: getAuthHeaders() });
            } catch (err) {}
            localStorage.removeItem('paypoint_user');
            localStorage.removeItem('paypoint_session');
            window.location.href = 'login.html';
        });

        // ============================================
        // INIT
        // ============================================
        checkAuth();
        loadDealsForInvoices();

        console.log('📄 PayPoint Invoices Page loaded');
        console.log('📡 Connected to:', API_URL);
    </script>

</body>
</html>
