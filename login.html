<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPoint · Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0E1A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #F59E0B, #FCD34D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .tab-switch {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #94A3B8;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #F59E0B;
            color: #0A0E1A;
        }

        .tab-btn:hover:not(.active) {
            color: #FFFFFF;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #CBD5E1;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 14px;
            transition: border 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #F59E0B;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #0A0E1A;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #EF4444;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .success-msg {
            color: #10B981;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .form-hidden {
            display: none;
        }

        .demo-note {
            text-align: center;
            color: #64748B;
            font-size: 12px;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 16px;
        }

        .demo-note span {
            color: #F59E0B;
            cursor: pointer;
        }

        .demo-note span:hover {
            text-decoration: underline;
        }
    </style>
    <script src="config.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="logo">PayPoint</div>
        <div class="subtitle">Finance OS for Creators</div>

        <!-- Tab Switch: Login / Signup -->
        <div class="tab-switch">
            <button class="tab-btn active" id="loginTab">Log In</button>
            <button class="tab-btn" id="signupTab">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="btn-primary" id="loginBtn">Log In</button>
            <div class="error-msg" id="loginError">Invalid email or password</div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="form-hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
            </div>
            <button class="btn-primary" id="signupBtn">Create Account</button>
            <div class="error-msg" id="signupError">Something went wrong</div>
            <div class="success-msg" id="signupSuccess">Account created! Please log in.</div>
        </div>

        <div class="demo-note">
            💡 Demo: <span id="demoLogin">Log in as test user</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_URL = window.__API_URL__ || '/api';

        // ============================================
        // DOM REFERENCES
        // ============================================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const loginError = document.getElementById('loginError');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');
        const demoLogin = document.getElementById('demoLogin');

        // ============================================
        // TAB SWITCHING
        // ============================================
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.remove('form-hidden');
            signupForm.classList.add('form-hidden');
            loginError.style.display = 'none';
            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.remove('form-hidden');
            loginForm.classList.add('form-hidden');
            loginError.style.display = 'none';
            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';
        });

        // ============================================
        // DEMO LOGIN (Skip for now, go to dashboard)
        // ============================================
        demoLogin.addEventListener('click', () => {
            // Redirect to dashboard (index.html)
            window.location.href = 'index.html';
        });

        // ============================================
        // SIGNUP FUNCTION
        // ============================================
        signupBtn.addEventListener('click', async () => {
            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;

            if (!name || !email || !password) {
                signupError.textContent = 'Please fill in all fields';
                signupError.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                signupError.textContent = 'Password must be at least 6 characters';
                signupError.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (data.success) {
                    signupSuccess.style.display = 'block';
                    signupError.style.display = 'none';
                    if (data.user) {
                        localStorage.setItem('paypoint_user', JSON.stringify(data.user));
                    }
                    if (data.session?.access_token) {
                        localStorage.setItem('paypoint_session', data.session.access_token);
                    }
                    // Clear form
                    signupName.value = '';
                    signupEmail.value = '';
                    signupPassword.value = '';
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        loginTab.click();
                    }, 1500);
                } else {
                    signupError.textContent = data.error || 'Signup failed';
                    signupError.style.display = 'block';
                    signupSuccess.style.display = 'none';
                }
            } catch (err) {
                signupError.textContent = 'Could not connect to server. Make sure backend is running.';
                signupError.style.display = 'block';
                signupSuccess.style.display = 'none';
                console.error('Signup error:', err);
            }
        });

        // ============================================
        // LOGIN FUNCTION
        // ============================================
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                loginError.textContent = 'Please enter email and password';
                loginError.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    // Save user info and session to localStorage
                    localStorage.setItem('paypoint_user', JSON.stringify(data.user));
                    if (data.session?.access_token) {
                        localStorage.setItem('paypoint_session', data.session.access_token);
                    }
                    // Redirect to dashboard
                    window.location.href = 'index.html';
                } else {
                    loginError.textContent = data.error || 'Invalid credentials';
                    loginError.style.display = 'block';
                }
            } catch (err) {
                loginError.textContent = 'Could not connect to server. Make sure backend is running.';
                loginError.style.display = 'block';
                console.error('Login error:', err);
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        loginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        signupPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') signupBtn.click();
        });

        console.log('🔐 PayPoint Login page loaded');
        console.log('📡 Connected to:', API_URL);
    </script>

</body>
</html>
