<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPoint · Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFFFF;
            color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .login-container {
            background: #FFFFFF;
            border: 1px solid #E8EDF2;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.06);
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #000000;
            text-align: center;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logo img { height: 40px; width: auto; }
        .subtitle {
            text-align: center;
            color: #8A9AAB;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .tab-switch {
            display: flex;
            background: #F8FAFC;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid #E8EDF2;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #5E6F82;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: #4F7CFF;
            color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(79, 124, 255, 0.25);
        }
        .tab-btn:hover:not(.active) { color: #000000; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #5E6F82;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #F8FAFC;
            border: 1px solid #E8EDF2;
            border-radius: 10px;
            color: #000000;
            font-size: 14px;
            transition: border 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus { outline: none; border-color: #4F7CFF; }
        .btn-primary {
            width: 100%;
            background: #4F7CFF;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 8px rgba(79, 124, 255, 0.25);
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: #3A5FD9;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(79, 124, 255, 0.35);
        }
        .error-msg {
            color: #FF3B30;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .success-msg {
            color: #34C759;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .form-hidden { display: none; }
        .demo-note {
            text-align: center;
            color: #8A9AAB;
            font-size: 12px;
            margin-top: 16px;
            border-top: 1px solid #E8EDF2;
            padding-top: 16px;
        }
        .demo-note span {
            color: #4F7CFF;
            cursor: pointer;
            font-weight: 500;
        }
        .demo-note span:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="PayPoint" onerror="this.style.display='none'">
            PayPoint
        </div>
        <div class="subtitle">Finance OS for Creators</div>

        <div class="tab-switch">
            <button class="tab-btn active" id="loginTab">Log In</button>
            <button class="tab-btn" id="signupTab">Sign Up</button>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="btn-primary" id="loginBtn">Log In</button>
            <div class="error-msg" id="loginError">Invalid email or password</div>
        </div>

        <div id="signupForm" class="form-hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
            </div>
            <button class="btn-primary" id="signupBtn">Create Account</button>
            <div class="error-msg" id="signupError">Something went wrong</div>
            <div class="success-msg" id="signupSuccess">Account created! Please log in.</div>
        </div>

        <div class="demo-note">
            💡 Demo: <span id="demoLogin">Log in as test user</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_URL = 'https://paypoint-backend-9m63.onrender.com/api';

        // ============================================
        // DOM REFERENCES
        // ============================================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const loginError = document.getElementById('loginError');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');
        const demoLogin = document.getElementById('demoLogin');

        // ============================================
        // TAB SWITCHING
        // ============================================
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.remove('form-hidden');
            signupForm.classList.add('form-hidden');
            loginError.style.display = 'none';
            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.remove('form-hidden');
            loginForm.classList.add('form-hidden');
            loginError.style.display = 'none';
            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';
        });

        // ============================================
        // SIGNUP
        // ============================================
        signupBtn.addEventListener('click', async () => {
            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;

            signupError.style.display = 'none';
            signupSuccess.style.display = 'none';

            if (!name || !email || !password) {
                signupError.textContent = 'Please fill in all fields';
                signupError.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                signupError.textContent = 'Password must be at least 6 characters';
                signupError.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (data.success) {
                    signupSuccess.style.display = 'block';
                    signupError.style.display = 'none';
                    signupName.value = '';
                    signupEmail.value = '';
                    signupPassword.value = '';
                    setTimeout(() => loginTab.click(), 1500);
                } else {
                    signupError.textContent = data.error || 'Signup failed';
                    signupError.style.display = 'block';
                }
            } catch (err) {
                signupError.textContent = 'Could not connect to server.';
                signupError.style.display = 'block';
            }
        });

        // ============================================
        // LOGIN (FIXED)
        // ============================================
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            loginError.style.display = 'none';

            if (!email || !password) {
                loginError.textContent = 'Please enter email and password';
                loginError.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success && data.user) {
                    // Save user and token
                    localStorage.setItem('paypoint_user', JSON.stringify(data.user));
                    if (data.session?.access_token) {
                        localStorage.setItem('paypoint_session', data.session.access_token);
                    }
                    // Redirect to dashboard
                    window.location.replace('index.html');
                } else {
                    loginError.textContent = data.error || 'Invalid credentials';
                    loginError.style.display = 'block';
                }
            } catch (err) {
                loginError.textContent = 'Could not connect to server.';
                loginError.style.display = 'block';
                console.error('Login error:', err);
            }
        });

        // ============================================
        // DEMO LOGIN (REAL ACCOUNT)
        // ============================================
        demoLogin.addEventListener('click', async () => {
            try {
                // Use a real demo account you create
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'demo@paypoint.com', password: 'DemoPassword123' })
                });
                const data = await res.json();
                if (data.success && data.user) {
                    localStorage.setItem('paypoint_user', JSON.stringify(data.user));
                    if (data.session?.access_token) {
                        localStorage.setItem('paypoint_session', data.session.access_token);
                    }
                    window.location.replace('index.html');
                } else {
                    alert('Demo login failed. Please try again.');
                }
            } catch (err) {
                alert('Demo login could not connect to server.');
                console.error(err);
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        loginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        signupPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') signupBtn.click();
        });

        // ============================================
        // AUTO-REDIRECT IF ALREADY LOGGED IN
        // ============================================
        const user = localStorage.getItem('paypoint_user');
        if (user) {
            try {
                const userData = JSON.parse(user);
                if (userData && userData.id) {
                    window.location.replace('index.html');
                }
            } catch (e) {
                localStorage.removeItem('paypoint_user');
                localStorage.removeItem('paypoint_session');
            }
        }

        console.log('🔐 PayPoint Login page loaded');
        console.log('📡 Connected to:', API_URL);
    </script>
</body>
</html>
