[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/api/*"
  to = "https://paypoint-backend-9m63.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://api.paystack.co; connect-src 'self' https://api.paystack.co https://*.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline';"
